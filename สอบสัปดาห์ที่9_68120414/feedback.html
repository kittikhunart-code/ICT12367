{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card p-4 shadow-sm">
            <h3>ส่งข้อเสนอแนะ</h3>
            <textarea id="txtInput" class="form-control" rows="5" placeholder="พิมพ์ข้อความ..."></textarea>
            <div class="mt-3 fs-5">
                จำนวนตัวอักษร: <span id="charCounter" class="badge bg-primary">0</span> ตัว
            </div>
        </div>
    </div>
</div>

<script>
    // โจทย์ที่ 2: JavaScript DOM & EventListener
    const input = document.getElementById('txtInput');
    const display = document.getElementById('charCounter');

    input.addEventListener('input', function() {
        display.innerText = input.value.length; // นับและแสดงผลทันที
    });
</script>
{% endblock %}
